# Polymarket Forecast Lab configuration.
# All defaults are documented; change values here, not in code.

# --- Universe -----------------------------------------------------------
universe:
  # One universe sync per hour (brief section 3).
  sync_interval_minutes: 60
  # Binary markets only in v1.
  binary_only: true
  # Skip sub-24h crypto "pulse" markets entirely (brief Phase 1).
  skip_sub_24h_crypto: true
  # Tiering thresholds applied to Gamma liquidity/volume fields (USD). Used
  # only as the bootstrap path for a market with no snapshot yet -- once one
  # exists, min_depth_usd below governs (Phase 17 item 2). Liquid thresholds
  # are set so the liquid tier stays ~400 markets: a 5-min snapshot round must
  # finish well inside the cadence at 5 req/s.
  tiers:
    liquid:
      min_liquidity: 100000
      min_volume: 1000000
      # Phase 17 item 2: our own collected order-book depth (bid_depth_usd +
      # ask_depth_usd from the latest snapshot), not Gamma's self-reported
      # liquidity_num -- and never volume_num, which is wash-trading-
      # contaminated (concentrated in sports) and kept as a covariate only.
      # Calibrated 2026-07-07 from the live snapshot depth distribution:
      # currently-liquid markets had median depth ~$1982, p25 ~$381; this sits
      # below p25 so the tier doesn't shrink sharply on cutover.
      min_depth_usd: 250
    tail:
      min_liquidity: 1000
      min_volume: 5000
      # Currently-tail markets had median depth ~$4, p75 ~$70; this sits
      # comfortably above the tail median without reclassifying most of it.
      min_depth_usd: 10
    # Anything below tail thresholds -> 'ignored'.
  # Priority categories for forecasting (brief section 3 universe policy).
  priority_categories:
    - economics        # P1: econ data releases & central-bank decisions
    - weather          # P2: model-drivable where present
    - politics         # P3: long-horizon (>=30d) politics/geopolitics
    - geopolitics      # P3
    - entertainment    # P4: awards, base-rate drivable
  # Structurally unforecastable: never forecast targets, kept out of universe
  # except where noted (calibration stats keep extreme-priced markets).
  excluded_categories:
    - crypto
    - equities
  # Markets priced beyond these bounds stay in calibration stats but are
  # never forecast targets (oracle/dispute tail risk dominates).
  forecast_price_bounds: [0.05, 0.95]
  # Null control: random sample of sports markets, cheap models only.
  null_control:
    category: sports
    sample_size: 30
    random_seed: 42

# --- Collection ---------------------------------------------------------
collect:
  snapshot_interval_minutes:
    liquid: 5
    tail: 60
  # Was briefly 5/3000 on 2026-07-03 to clear a 10.8k resolution backlog
  # (a one-time consequence of the closed=false Gamma-filter bug fix); backlog
  # cleared to steady-state (~500, mostly genuinely-not-yet-resolved markets)
  # within ~1.5h, so back to a normal cadence -- no reason to keep hammering
  # Gamma once there's no backlog left to work through.
  resolution_poll_minutes: 30
  # Candidates checked per watch_resolutions() cycle. Modest headroom over the
  # old hardcoded 200 in case of a future gap, without re-scanning thousands
  # of still-pending markets every cycle for no benefit.
  resolution_backlog_limit: 300
  # Order-book levels stored per side in snapshots (historical depth is
  # unrecoverable later; models don't consume it yet).
  book_depth_levels: 10
  # Global async token bucket shared by all Polymarket hosts. Brief section 3
  # notes read limits are generous (thousands per 10s); this stays well below
  # that while cutting the ~4.4k-market tail-tier round from ~15min to ~7.5min.
  rate_limit:
    requests_per_second: 10
    burst: 20
  # Kill file: when present, all polling halts within one cycle.
  pause_file: data/PAUSE

# --- Forecasting --------------------------------------------------------
forecast:
  # Once per market per day per model...
  cadence_hours: 24
  # ...plus an extra forecast when |24h price move| exceeds this.
  price_move_trigger: 0.10
  # Probabilities clamped to this range before writing to the ledger.
  p_clamp: [0.01, 0.99]
  # Price freshness guard (brief guardrail 13): skip forecast if the latest
  # snapshot is older than this, per tier.
  max_snapshot_age_minutes:
    liquid: 15
    tail: 90
  # M3 runs only on the liquid tier: top-K by liquidity within priority
  # categories -- a deterministic rule, never editorial judgment.
  m3_top_k: 20
  # Phase 15 boundary-randomization experiment (guardrail 12's pre-specified,
  # seeded-randomization carve-out): markets ranked m3_top_k-10..+10 are
  # randomly assigned to M3 coverage instead of a hard cutoff, to identify
  # M3's marginal contribution causally. Default OFF -- changes M3's live
  # targeting/cost profile, so enabling it is a deliberate choice, not a
  # silent behavior change. Seed is fixed and committed (mirrors
  # universe.null_control.random_seed's pattern), never rolled fresh per run.
  m3_boundary_randomization_enabled: false
  m3_boundary_random_seed: 43

# --- LLM ----------------------------------------------------------------
llm:
  # anthropic | deepseek (OpenAI-compatible)
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  # Hard daily USD cap enforced in code before each call.
  daily_cost_cap_usd: 5.00
  pricing:
    input_per_mtok: 0.14
    output_per_mtok: 0.28

# --- News retrieval (M3) --------------------------------------------------
news:
  # Google News RSS is always used; extra RSS feeds are optional.
  rss_feeds: []

# --- M3 aggregation defaults (refit monthly via `lab learn`) -------------
m3:
  k: 0.15                 # per-item log-odds contribution scale
  tau_days: 5             # recency decay time constant
  max_shift_logodds: 0.8  # cap on total shift per run

# --- Evaluation ---------------------------------------------------------
eval:
  calibration_bins: 10
  bootstrap_iterations: 2000
  # Honesty thresholds (brief section 7).
  n_insufficient: 200
  n_preliminary: 500
  # Reporting windows: all-time and trailing-90-days only. No cherry-picking.
  windows: [all_time, trailing_90d]
  clv_horizons_hours: [24, 72]
  # Phase 17 item 4: CLV validity diagnostic -- correlation of per-forecast
  # signed drift with per-forecast realized paired-Brier skill on the sports
  # null control. |correlation| > clv_null_control_max_corr with n at least
  # clv_null_control_min_n flags the CLV metric untrusted lab-wide.
  clv_null_control_min_n: 30
  clv_null_control_max_corr: 0.15
  # Anytime-valid confidence sequence (brief section 7, Phase 11) -- kept
  # separate from the bootstrap's own implicit alpha (fixed at 0.05 in
  # scoring.cluster_bootstrap_ci) in case they're ever tuned independently.
  confidence_sequence:
    alpha: 0.05
  # Phase 16 (v2.4): RPS is scored on an eval_runs row only once >= this many
  # bucketed (negRisk, ordered-bucket) events have resolved for that
  # model/venue/category/window -- the phase's own literal threshold.
  min_bucketed_events: 20

# --- Shadow portfolio (SIMULATION only) ----------------------------------
shadow:
  bankroll_sim_usd: 10000
  min_edge: 0.05
  max_spread: 0.03
  min_depth_usd: 500
  entry_price_bounds: [0.05, 0.95]
  kelly_fraction: 0.2
  per_market_cap: 0.05
  per_category_cap: 0.20
  # Slippage haircut proportional to (stake / visible depth), capped.
  slippage_coefficient: 0.5
  slippage_cap: 0.02
  # Phase 15: real, sourced per-venue taker-fee rates (net-of-cost accounting,
  # brief section 8/15) -- see the file itself for sources and the derived
  # fee_usd = stake * rate * (1 - entry_price) formula.
  fee_schedule_path: data/fee_schedule.yaml

# --- Learning loop (monthly `lab learn`) ---------------------------------
learn:
  m3_min_resolved: 150     # gate for M3 aggregator walk-forward fit
  m4_min_resolved_per_category: 100  # equal weights below this
  postmortem_decile: 0.10  # top decile of misses and wins each month
  # Safeguards (brief section 6 / Phase 7.1). Learning is dry-run by default;
  # `lab learn --apply` commits, and every change is versioned + reversible.
  max_step_pct: 0.20       # no live parameter moves more than 20% (relative) per cycle
  rollback_window: 50      # trailing resolved forecasts the rollback breaker scores over
  promotion_min_n: 200     # min resolved markets before a CI-gated promotion can fire
  # M5 macro surprise distribution: fit on FRED's own point-in-time GDPNOW/PCENOW
  # history vs realized BEA releases (no ALFRED vintage query needed -- see
  # learn/refit.py). Requires FRED_API_KEY; skipped without one.
  m5_macro:
    min_quarters: 12         # skip a series with fewer paired (nowcast, actual) quarters
    validation_quarters: 8   # trailing quarters held out for the walk-forward split
  # Extremization exponent fits (Phase 13, CLAUDE.md M4/M7 extremization).
  # Below these, a category (M4) / overall (M7) stays at a=1.0 (no extremization) --
  # the same "insufficient data" default as everywhere else in this project.
  m4_extremization_min_n: 60   # per-category resolved m4_ensemble forecasts needed
  m7_extremization_min_n: 60   # resolved m7_crossvenue forecasts needed (single pooled fit)
  # Weight floor/ceiling (Phase 14.1, v2.2 parity): the incumbent monthly M4
  # weight fit gets the SAME per-model protection given to the MWU challenger
  # below, so it isn't less protected against streak-driven concentration
  # than the challenger trying to unseat it.
  m4_weight_floor: 0.02
  m4_weight_ceiling: 0.60
  # Shadow MWU ensemble weighting (Phase 14.1). Nightly (inside `lab eval`,
  # not the monthly `lab learn` cycle) -- guardrail 17's one narrow, explicit
  # exception to guardrail 14, because it touches only meta-level ensemble
  # weights, never model internals.
  mwu:
    correlation_cluster_threshold: 0.8   # pairwise rho >= this groups models for the cluster ceiling
    probation_days: 90                    # minimum age of the first mwu-tagged version before promotion is even considered
    probation_min_n: 200                  # per-category resolved forecasts required, mirrors promotion_min_n's honesty tier

# --- Orchestrator schedule (`lab run`) ----------------------------------
# The one-button process keeps the collector running and fires these analytics
# jobs on cron triggers. All times are UTC (crontab syntax: m h dom mon dow).
schedule:
  forecast_cron: "0 2 * * *"    # nightly 02:00 UTC -> forecast, eval, report
  shadow_cron: "0 3 * * 0"      # weekly Sunday 03:00 UTC -> shadow portfolio
  learn_cron: "0 4 1 * *"       # monthly, 1st at 04:00 UTC -> learning loop
  # Run one forecast/eval/report pass immediately on startup so the button
  # produces visible results without waiting for the first cron fire.
  run_on_start: true
  # Missed-run catch-up. If a service's last successful run is older than its
  # control time (max allowed age), the orchestrator runs it immediately -- on
  # startup and again whenever the hourly health check notices a window was missed.
  control:
    forecast_max_age_hours: 24     # nightly bundle should run at least daily
    shadow_max_age_hours: 168      # weekly -> 7 days
    learn_max_age_hours: 720       # monthly -> 30 days
    pmxt_verify_max_age_hours: 18  # twice-daily -> catch-up if a ~12h cycle is missed
    paper_export_max_age_hours: 192  # weekly -> 8 days (small buffer over the 7-day cadence)
  # Hourly health/liveness check: re-runs overdue analytics services and forces
  # a collection cycle if the collector has stalled (liquid snapshots too old).
  health_check_interval_minutes: 60

# --- Watchdog (optional supervisor) ---------------------------------------
# `lab watchdog` runs `lab run` as a child process and auto-restarts it after
# any exit (crash or otherwise). The delay is deliberate: it gives an operator
# a window to notice something is wrong before the watchdog silently
# resurrects a process that might be crash-looping, and it avoids hammering
# Polymarket's API with restart attempts if something is actually broken.
watchdog:
  restart_delay_seconds: 600   # 10 minutes

# --- Phase 18: dead-man heartbeat (optional) ------------------------------
# Outbound-only ping to a healthchecks.io-class endpoint; HEARTBEAT_URL unset
# in .env means this is silently off (brief S12 carve-out -- an outbound
# ping is not a notification bot; the external monitoring service does the
# alerting, our code never does). Both the collector loop (this interval)
# and the nightly backup job ping the SAME url at their own natural cadence
# -- if setting this up for real, prefer healthchecks.io's "Cron" check type
# over "Simple", since two different cadences hit one check.
ops:
  heartbeat_interval_minutes: 5

# --- Cross-venue signal (M7, Phase 9, optional) --------------------------
# `data/markets_map.yaml` is the confirmed-pairs source of truth (hardcoded
# path, same precedent as M6's links.yaml). `lab map propose` only covers
# Kalshi -- Metaculus's public API now requires an account/API token as of
# 2026-07-03 (see api/metaculus.py), so a Metaculus pair must be hand-curated
# via `lab map confirm --venue metaculus`.
cross_venue:
  # 20 -> 40: live diagnosis found Kalshi's per-category economics/rate-decision
  # series frequently have zero currently-open markets at any given moment
  # (they open near the actual meeting date and close/resolve shortly after),
  # so a narrow per-category share missed real overlap that existed just a
  # few events further down each category's list. Doubling casts a wider net
  # per run at a small, LLM-budget-capped cost (guardrail 10).
  propose_top_k: 40        # candidate liquid-tier, priority-category markets per `lab map propose` run
  # Deliberately its OWN budget, not venues.kalshi.max_series_per_sync --
  # that one's tuned for the hourly universe-sync politeness budget; propose
  # runs weekly (propose_cron below) and can afford to check more series per
  # priority category each time.
  propose_series_per_category: 40
  propose_cron: "0 5 * * 1" # weekly, Monday 05:00 UTC -- orchestrator runs `lab map propose`
                             # automatically. It only ever appends to `proposed`; a human still
                             # must run `lab map confirm` before a pair feeds M7 (propose-then-
                             # confirm is a hard requirement, not something automation may skip).
  # Phase 17 item 3: confirmed pairs only (the human-curated, already-rate-
  # limit-aware markets_map.yaml set) get a much tighter cadence than the
  # tier-wide 5/60-min loops -- the lead-lag hypothesis (PAP H3) is
  # underpowered on a 5-min grid, and finer history can't be captured
  # retroactively. Bounded fan-out: this only ever touches the small,
  # human-confirmed pair set, never the wider universe.
  hf_snapshot_interval_minutes: 1
  # pmxt Router candidates (Claude.md tech-stack row / §12): a THIRD-PARTY
  # tool proposes raw pairs entirely out-of-band via its own separate Windows
  # Scheduled Task (scripts/pmxt_router_scan.py + install-pmxt-scan-task.ps1)
  # -- never imported into src/lab or called from this process. This job only
  # reads the plain data/pmxt_candidates.json that scan writes and runs our
  # own independent LLM check on each pair before it ever reaches `proposed`.
  pmxt_verify_cron: "0 6,18 * * *"  # twice daily, 06:00 and 18:00 UTC

# --- Multi-venue collectors (Phase 10, v1.9) -------------------------------
# Each venue gets its OWN TokenBucket instance (per-host rate limiters, brief
# Phase 10) -- not literally the same object as Polymarket's, but likewise
# conservative, so one venue being slow/rate-limited never stalls another.
venues:
  kalshi:
    sync_interval_minutes: 60
    snapshot_interval_minutes: 5
    resolution_poll_minutes: 30
    rate_limit:
      requests_per_second: 8   # brief section 3: Kalshi tolerates ~10 req/s; stay under it
      burst: 16
    # Kalshi's own /series category -> our taxonomy mapping now lives in
    # data/categories.yaml's `kalshi_series` key (Phase 17 item 1 -- a single
    # versioned taxonomy file instead of one hand-maintained map per venue).
    # Crypto/Financials excluded outright -- same "structurally unforecastable"
    # rule as Polymarket (brief section 3 universe policy): these are 15-min
    # crypto price-target markets, the market price IS the forecast.
    excluded_series_categories: ["Crypto", "Financials"]
    max_series_per_sync: 40   # bounds per-cycle series fan-out (politeness + runtime)
    tiers:
      liquid: { min_liquidity: 1000, min_volume: 5000 }
      tail: { min_liquidity: 0, min_volume: 0 }

  metaculus:
    snapshot_interval_minutes: 60
    resolution_poll_minutes: 60
    rate_limit:
      requests_per_second: 3
      burst: 6
    # No broad universe sync (brief Phase 10 task text is explicit: snapshots +
    # resolution watcher only) -- Metaculus only ever tracks questions already
    # confirmed in markets_map.yaml; nothing forecastable/collectable until a
    # human confirms a match, same propose-then-confirm gate M7 already uses.

  manifold:
    sync_interval_minutes: 60
    rate_limit:
      requests_per_second: 5
      burst: 10
    max_markets_per_sync: 1000   # bounded, paginated fetch of resolved+open binary markets

# --- Results publishing (private mirror) ----------------------------------
# After every nightly forecast/eval/report bundle, mirror curated results
# (reports, latest forecast export, model artifacts) into a private git
# checkout and push. Curated only -- never the raw data/lab.db or
# data/snapshots/; bulk-copying and pushing the full collected dataset is
# an intentionally manual step (scripts/publish_results.py --raw-data),
# run by hand, not by this automatic job. Never blocks or re-triggers the
# bundle it follows on failure (e.g. no network) -- see jobs.run_publish_job.
publish:
  enabled: true
  results_dir: ../Polymarket-results   # sibling checkout of the private results repo
  # Raw-data backup to the private results repo (brief section 11: "the
  # historical order-book snapshots cannot be re-downloaded later"). Both
  # default OFF -- an operator who wants only the curated nightly mirror
  # (reports/exports/models) gets exactly the pre-existing behavior with no
  # config change. Split into two independent knobs because they have very
  # different LFS-bandwidth costs: snapshots are small/incremental (only
  # new/changed parquet partitions copy) so they can push every night for
  # free; data/lab.db is a single ever-growing binary blob with no LFS delta
  # compression -- every push transfers its full current size, so pushing it
  # nightly would burn a GitHub LFS free-tier month's bandwidth (1GB) in
  # days once it passes a few hundred MB. db_interval_days spaces those
  # pushes out to fit a free-tier LFS plan; raise results_dir's LFS plan (or
  # this interval) if the db grows enough to need it more often.
  raw_data:
    snapshots_enabled: true
    db_enabled: true
    db_interval_days: 3
    # Backs up .env (every API key: DeepSeek/Anthropic, FRED, Metaculus,
    # NewsAPI, HEARTBEAT_URL, PMXT_API_KEY) into the private results repo
    # every night as .env.backup, so losing this laptop doesn't mean
    # re-requesting every key from scratch. No interval gating -- the file
    # is tiny. See publish.sync_env's docstring for the tradeoff: this puts
    # every key ever set into that repo's git history permanently, even
    # after rotation. Confirmed the results repo is a genuinely private
    # GitHub repo before turning this on.
    env_enabled: true

# Phase 15 (v2.3): nightly cryptographic pre-registration -- sha256 over each
# closed UTC day's appended forecasts rows, committed to commitments_path in
# THIS repo (not the results mirror above) so a reviewer can later recompute
# the same hash from the DB and confirm the ledger wasn't edited after the
# fact. push:false is a local-testing-only escape hatch -- production always
# pushes, since an unpushed commitment on a public repo verifies nothing.
ledger:
  enabled: true
  commitments_path: docs/ledger_commitments.jsonl
  push: true

# Phase 15 addendum (v2.8): weekly automated `lab export --paper` snapshot,
# committed to the SAME public repo docs/ledger_commitments.jsonl lives in
# (independent verifiability -- see ledger_commitment.py's own docstring).
# Distinct from the on-demand `lab export --paper --out <path>` CLI flow,
# which stays available for one-off manual exports and is unaffected.
paper_export:
  enabled: true
  dir: docs/paper_exports
  cron: "0 5 * * 0"   # weekly, Sunday 05:00 UTC -- after the nightly bundle's
                       # own ledger-commitment push (02:00) and the weekly
                       # shadow job (03:00), so git pushes don't overlap
  push: true

# --- Storage -------------------------------------------------------------
storage:
  db_path: data/lab.db
  snapshots_dir: data/snapshots
  models_dir: data/models
  logs_dir: data/logs
  reports_dir: reports
